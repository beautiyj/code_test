      // 1. 우편번호 체크
      function openDaumPostcode() {
        new daum.Postcode({
          oncomplete: function (data) {
            // 콜백함수
            document.getElementById("post").value = data.zonecode;
            document.getElementById("address").value = data.address;
          },
        }).open();
      }
    </script>

  <body>
    <form method="post" action="member.jsp">
      <table border="1" width="600" align="center">
        <caption>
          회원가입 폼
        </caption>

        <tr>
          <th><label for="id">ID</label></th>
          <td>
            <input type="text" id="id" name="id" size="10" autofocus />
            <input type="button" value="ID 중복검사" onclick="idCheck()" />
          </td>
        </tr>

        <tr>
          <th><label for="password">비밀번호</label></th>
          <td>
            <input type="password" id="password" name="password" />
          </td>
        </tr>

        <tr>
          <th><label for="name">성명</label></th>
          <td>
            <input type="text" id="name" name="name" />
          </td>
        </tr>

        <tr>
          <th><label for="rrn1">주민번호</label></th>
          <td>
            <input
              type="text"
              id="rrn1"
              name="rrn1"
              size="6"
              maxlength="6"
              oninput="autoTab(this, document.getElementById('rrn2'))"
            />
            -
            <input type="password" id="rrn2" name="rrn2" size="7" maxlength="7" />
          </td>
        </tr>

        <tr>
          <th><label for="email">email</label></th>
          <td>
            <input type="text" id="mailid" name="mailid" size="10" />
            @
            <input type="text" id="domain" name="domain" size="15" />
            <!-- 제이쿼리 적용 시 -->
            <!-- <select id="email"> -->
            <select id="email" onchange="domain1()">
              <option value="">직접입력</option>
              <option value="naver.com">네이버</option>
              <option value="daum.net">다음</option>
              <option value="gmail.com">구글</option>
              <option value="nate.com">네이트</option>
            </select>
          </td>
        </tr>

        <tr>
          <th><label for="tel1">전화번호</label></th>
          <td>
            <input
              type="text"
              id="tel1"
              name="tel1"
              pattern="[0-9]{4}"
              size="4"
              maxlength="4"
              oninput="autoTab(this, document.getElementById('tel2'))"
            />
            -
            <input
              type="text"
              id="tel2"
              name="tel2"
              pattern="[0-9]{4}"
              size="4"
              maxlength="4"
              oninput="autoTab(this, document.getElementById('tel3'))"
            />
            -
            <input type="text" id="tel3" name="tel3" pattern="[0-9]{4}" size="4" maxlength="4" />
          </td>
        </tr>

        <tr>
          <th><label for="phone1">휴대폰</label></th>
          <td>
            <select id="phone1" name="phone1">
              <option value="">번호 선택</option>
              <option value="010">010</option>
              <option value="011">011</option>
              <option value="016">016</option>
              <option value="018">018</option>
              <option value="019">019</option>
            </select>
            -
            <input
              type="text"
              id="phone2"
              name="phone2"
              pattern="[0-9]{4}"
              size="4"
              maxlength="4"
              oninput="autoTab(this, document.getElementById('phone3'))"
            />
            -
            <input type="text" id="phone3" name="phone3" pattern="[0-9]{4}" size="4" maxlength="4" />
          </td>
        </tr>

        <tr>
          <th><label for="post">우편번호</label></th>
          <td>
            <input type="number" id="post" name="post" size="5" maxlength="5" />
            <input type="button" value="우편검색" onclick="openDaumPostcode()" />
          </td>
        </tr>

        <tr>
          <th><label for="address">주소</label></th>
          <td>
            <input type="text" id="address" name="address" size="70" />
          </td>
        </tr>

        <tr>
          <th><label for="gender">성별</label></th>
          <td>
            <input type="radio" id="male" name="gender" value="남자" /> 남자
            <input type="radio" id="female" name="gender" value="여자" /> 여자
            <input type="radio" id="gender" name="gender" value="선택안함" /> 선택안함
          </td>
        </tr>

        <tr>
          <th><label for="hobby1">취미</label></th>
          <td>
            <input type="checkbox" id="hobby1" name="hobby" value="공부" />공부
            <input type="checkbox" id="hobby2" name="hobby" value="등산" />등산
            <input type="checkbox" id="hobby3" name="hobby" value="게임" />게임
            <input type="checkbox" id="hobby4" name="hobby" value="낚시" />낚시
            <input type="checkbox" id="hobby5" name="hobby" value="쇼핑" />쇼핑
          </td>
        </tr>

        <tr>
          <th><label for="content">자기소개</label></th>
          <td>
            <textarea
              id="content"
              name="content"
              cols="50"
              rows="10"
              maxlength="100"
              class="hint-gray"
              placeholder="자기소개를 100자 이내로 입력하세요."
            ></textarea>
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <!-- 제이쿼리에선 온클릭 삭제 -->
            <!-- <input type="submit" value="회원가입" /> -->
            <input type="submit" value="회원가입" onclick="return check();" />
            <input type="reset" value="취소" />
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
