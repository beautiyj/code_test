<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Document</title>
</head>
<body>

<!-- colspan 콜스팬 속성: 열 합치기. td,th(헤더) 태그 안에서만 사용 가능 -->
<table align="center" border="1" height="200" width="300">
    <tr align="center">
        <td colspan="3">동물</td>
    </tr>
    <tr align="center">
        <td>호랑이</td>
        <td>사자</td>
        <td>원숭이</td>
    </tr>
</table>


<table align="center" border="1" height="200" width="600">
    <tr align="center">
        <td colspan="3">동물</td>
        <td colspan="3">꽃</td>
    </tr>
    <tr align="center">
        <td width="100">호랑이</td>
        <td width="100">사자</td>
        <td width="100">원숭이</td>
        <td width="100">장미</td>
        <td width="100">백합</td>
        <td width="100">민들레</td>
    </tr>
</table>

<br> ---------------------------------------------------------------<br>

<!-- rowspan 로우스팬 속성: 행 합치기. td,th(헤더) 태그 안에서만 사용 가능 -->
<table align="center" border="1" height="300" width="200">
    <tr align="center">
        <td rowspan="3">동물</td>
        <td>호랑이</td>
    </tr>
    <tr align="center">
        <td>사자</td>
    </tr>
    <tr align="center">
        <td>원숭이</td>
    </tr>
</table>

<br> ---------------------------------------------------------------<br>


<table align="center" border="1" height="600" width="400">
    <tr align="center">
        <td rowspan="3">동물</td>
        <td>호랑이</td>
    </tr>
    <tr align="center">
        <td>사자</td>
    </tr>
    <tr align="center">
        <td>원숭이</td>
    </tr>

    <tr align="center">
        <td rowspan="3">꽃</td>
        <td>장미</td>
    </tr>
    <tr align="center">
        <td>백합</td>
    </tr>
    <tr align="center">
        <td>민들레</td>
    </tr>

</table>

</body>
</html>
