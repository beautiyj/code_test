<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Document</title>
</head>
<body>

<!-- 입력 양식 종류 -->
<input type="button" value="button은 전송 기능이 없음">
<input type="submit" value="submit은 전송 기능이 있음">
<input type="reset" value="reset은 초기화 기능">
<!-- size는 입력창 크기, autofocus는 자동 커서 포커싱,
 maxlength은 글자수 제한, required는 값이 잘 입력됐는지 체크알림용(유효성검사)
 id는 고유 속성값 지정 autocomplete="on"은 자동완성기능
 palceholder는 칸에 미리 적어두는 힌트텍스트 name은 키값(컬럼명, 서버전달용)-->


<!--
<form> 태그 : 데이터를 다른 파일로 전달할때 사용하는 태그
<form  method = “post”   action = “send.jsp“ >
        메소드는 값 전달하는 방식을 설정하는 속성
                        액션은 값이 전달될 파일명 설정

값전달 방식
    GET 방식 : 전달되는 데이터가 URL주소에 노출된다.(a href처럼) 검색이나 조회엔 겟 사용
    POST방식 : 전달되는 데이터가 URL주소에 노출되지 않는다.
            보안상 안전하게 값을 전달하는 방식. 로그인, 회원가입, 글쓰기는 무조건 포스트 사용
값전달 페이지 설정 :  action = “send.jsp” (스프링방식은 확장자명 생략하는 등 다르긴 함)
-->


<!-- 액션 부분엔 파일명이나 값 받아주는 거 들어와야해서 html 불가
메소드가 겟/포스트마다 url이 달라짐 -->
<form action="login.jsp" method="post">
    <table align="center" border="1" width="350">
        <caption>로그인 폼</caption>
        <tr>
            <!-- <th><label for="user-id">아이디</label></th>
             장애인 편의성을 위해 실제론 라벨링 애용. 아이디만 눌러도 커서칸 이동됨 -->
            <th><label for="id">ID</label></th>
            <td><input autofocus id="id"
                       maxlength="10" name="id" required
                       size="10" type="text"></td>
        </tr>
        <tr>
            <!-- <th>PW</th>는 말그대로 글자만 보임, 라벨링은 글자 누르면 칸 이동됨 -->
            <th><label for="password">PW</label></th>
            <td><input class="hint-gray" id="password"
                       name="password" placeholder="비밀번호 입력" type="password"></td>
        </tr>
        <tr>
            <td align="center" colspan="2">
                <input type="submit" value="로그인">
                <input type="reset" value="취소">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
