<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>semantic 태그</title>
</head>

<body>
<header>
    <h1>HTML5 기본</h1>
</header>

<!-- 내비바 -->
<nav>
    <ul>
        <li><a href="#">메뉴 - 1</a></li>
        <li><a href="#">메뉴 - 2</a></li>
        <li><a href="#">메뉴 - 3</a></li>
    </ul>
</nav>

<!-- 섹션 구역 -->
<section>
    <article>
        <h2>본문1</h2>
        <p>재산권의 행사는 공공복리에 적합하도록 하여야 한다.
            정부는 회계연도마다 예산안을 편성하여 회계연도 개시 90일전까지 국회에 제출하고,
            국회는 회계연도 개시 30일전까지 이를 의결하여야 한다.</p>
    </article>
    <article>
        <h2>본문2</h2>
        <p>예비비는 총액으로 국회의 의결을 얻어야 한다.
            예비비의 지출은 차기국회의 승인을 얻어야 한다.
            이 헌법시행 당시의 법령과 조약은 이 헌법에 위배되지 아니하는 한 그 효력을 지속한다.</p>
    </article>
</section>

<footer>
    <address>서울특별시 강남구 서초동</address>
</footer>
</body>
</html>
