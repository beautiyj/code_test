  <body>
    <form method="post" action="borad.jsp">
      <table border="1" width="600" align="center">
        <caption>
          게시판
        </caption>
        <tr>
          <th><label for="writer">작성자</label></th>
          <td>
            <input
              type="text"
              id="writer"
              name="writer"
              size="10"
              class="hint-gray"
              placeholder="작성자명 입력"
              autofocus
            />
          </td>
        </tr>

        <tr>
          <th><label for="password">비밀번호</label></th>
          <td>
            <input
              type="password"
              id="password"
              name="password"
              size="10"
              class="hint-gray"
              placeholder="비밀번호"
            />
          </td>
        </tr>

        <tr>
          <th><label for="title">제목</label></th>
          <td>
            <input
              type="text"
              id="title"
              name="title"
              size="20"
              class="hint-gray"
              placeholder="20자 이내로 입력"
            />
          </td>
        </tr>

        <tr>
          <th><label for="content">내용</label></th>
          <td>
            <textarea
              id="content"
              name="content"
              cols="50"
              rows="10"
              class="hint-gray"
              placeholder="내용 입력"
              ></textarea>
              
              <!-- placeholder="200자 이내로 입력" -->

          </td>
        </tr>
        <tr>
          <th>파일첨부</th>
          <td><input type="file" id="myfile" name="myfile" /></td>
        </tr>

        <tr>
          <td colspan="2" align="center">

            <input type="button" value="글작성 버튼형식" />
            <input type="reset" value="취소" />
          </td>
        </tr>
      </table>
    </form>
