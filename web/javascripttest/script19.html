<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus, Blur Event 포커스,블러 이벤트 예제 ver 2</title>

    <!-- Focus, Blur Event 포커스,블러 이벤트 예제 ver 2
         커서로 눌러도 내용 텍스트가 사라지지 않는 경우 -->

    <script>
      /*
        자바스크립트는 html이 실행된 다음에 사용됨
        함수 위쪽에 있는 id와 passwd는 정상적으로 인식되지 않음
            let id = document.getElementById("id");
            let passwd = document.getElementById("passwd");

            클릭(커서 진입)  →  onFocus  →  value = ""           (내용 지움)
            클릭 해제(이탈)  →  onBlur   →  value = defaultValue  (원래값 복원)
      */
      function id_focus() {
        // focus 이벤트
        let id = document.getElementById("id");
        id.value = "";
      }
      function id_blur() {
        // blur 이벤트
        let id = document.getElementById("id");
        id.value = id.defaultValue;
      }
      function passwd_focus() {
        // focus 이벤트
        let passwd = document.getElementById("passwd");
        passwd.value = "";
      }
      function passwd_blur() {
        // blur 이벤트
        let passwd = document.getElementById("passwd");
        passwd.value = passwd.defaultValue;
      }
    </script>
  </head>
  <body>
    <form>
      아이디 :<input
        type="text"
        id="id"
        value="아이디 입력"
        onFocus="id_focus()"
        onBlur="id_blur()"
      /><br />
      비밀번호:<input
        type="text"
        id="passwd"
        value="비밀번호 입력"
        onFocus="passwd_focus()"
        onBlur="passwd_blur()"
      /><br />
    </form>
  </body>
</html>
