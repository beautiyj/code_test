<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 과제
    Math.random()을 이용해서 1~45 사이의 난수 6개 추출하는 프로그램 작성하기(로또 자바스크립트 버전)
    조건: 중복되지 않는 값을 구하기, 구해진 값을 오름차순 정렬하기 
    -->

    <script>

        /*
        // 배열 대신 Set을 사용하면 중복체크 없이 그대로 진행 가능
        const numberSet = new Set();
        numberSet.add(num);                  // 중복이면 알아서 무시됨

        // 나중에 배열로 바꾸고 싶을 때는 set에 전개연산자 사용해서 배열화시키기. 레퍼런스형변환은 아니고 새로운 배열 객체를 생성하는 거
        const numbers = [...numberSet];      // ... 은 자바스크립트의 전개연산자(내용물을 하나씩 꺼내서 흩뿌려주는 역할)
        // 전개연산자 없이 배열화하는 경우
        const numbers = Array.from(numberSet);  // 객체(numberSet) 로부터(from) 배열(Array) 만들기!
        */
        let numbers = new Array();

        while (numbers.length<6) {
            let num = Math.floor(Math.random() * 45) + 1;

            if (!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        document.write("<br>");

        function num() {
            document.write("문자열 오름차순돼서 오류나는 경우: ");
            document.write(numbers.sort()); // 이렇게 하면 문자형데이터 자체로 오름차순 정렬됨
                                            // 사전적 의미라서 1,11,2 순서)
            
            document.write("<br>");
            
            document.write("숫자 오름차순 잘 적용되는 경우: ");
            numbers.sort((a, b) => a - b);  // 숫자 기준 오름차순 정렬. 배열엔 Number 사용 불가함
            document.write(numbers);
        }
    </script>
  </head>
  <body>
    <script>
        num();
    </script>
  </body>
</html>
