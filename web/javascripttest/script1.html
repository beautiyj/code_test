<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 외부 자바스크립트 파일 불러오기 -->
    <script src="external.js"></script>

  </head>
  <body>

    <!-- 외부 자바스크립트 파일에서 정의한 함수 호출 -->
    <script>
    printDate(); // 혹은 js파일에 호출까지 넣어도 됨
    </script>

    <script>
        // 얼럿 함수는 헤드말고 바디에 두는 게 일반적
        // alert 얼럿은 메시지 박스에 텍스트를 표시하는 함수
        // window.alert("출력성공");    // 이렇게 쓰는 게 원칙인데 윈도우는 생략 가능(보통 생략)
        alert("출력성공");
    </script>

    <script>
        // document.write() 함수는 웹 페이지에 텍스트를 출력하는 함수
        // 문자 출력에 '' "" 모두 사용 가능하나,
        // 문자열 안에 '' 있으면 ""로 감싸야하고 ""큰따옴표가 있으면 ''작은따옴표로 감싸야 함
        
        // 문자열 안에 작은따옴표 있으면 큰따옴표로 감싸기
        document.write("I'm a student<br>");
        // 문자열 안에 큰따옴표 있으면 작은따옴표로 감싸기
        document.write('그가 "안녕"이라고 했다<br>');
        // 둘 다 있으면? → 백틱 ` (템플릿 리터럴) 사용
        document.write(`I'm "개발자"입니다<br>`);

        // document.write() 함수는 웹 페이지에 텍스트를 출력하는 함수
        // writeln()은 html상이 아닌 pre안에서 줄바꿈됨+그외는 공백만 출력되는데 옛날거라 잘 안씀
        window.document.writeln("처음 작성하는 자바스크립트1 <br>");
        document.write('처음 작성하는 자바스크립트2' + '<br>');
        document.write("처음 작성하는 자바스크립트3" + "<br>");
    </script>

    <script type="text/javascript">
        // type="text/javascript"는 자바스크립트 코드임을 명시하는 속성
        // HTML5에서는 기본값이 자바스크립트이므로 생략 가능함

        // 단일행 주석 ctrl + /
        /* 다중행 주석 ctrl + shift + / */
        document.write("함수들 대소문자 구분함, 맨 끝에 ; 생략 가능.<br> ");
    </script>

    <script language="javascript">
        // language="javascript"는 자바스크립트 코드임을 명시하는 속성
        // HTML5에서는 type 속성이 더 이상 사용되지 않으므로 language 속성도 생략 가능함
        document.write(`type= "text/javascript"나 language="javascript"나 동일하게 사용 가능 <br>`);
    </script>

    <script>
        // 웹브라우저에서 단축키 f12 누르면 콘솔창 출력되는 거 확인 가능(sources에서 하단의 console창)
        console.log("콘솔에 출력");

    </script>
  </body>
</html>
