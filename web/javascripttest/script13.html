<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- 자바 스트립트 내장 객체
    Math 객체는 수학적 계산을 처리하는데 사용되는 객체
    
    // 속성
    Math.E          // 오일러 상수 : 2.718281828459045
    Math.PI         // 원주율

    // 메소드
    Math.abs(-30)           // 절댓값
    Math.max(10,5,8,30,50)  // 최댓값
    Math.min(10,5,8,30,50)  // 최솟값
    Math.ceil(2.5234)       // 올림
    Math.round(2.5234)      // 반올림
    Math.floor(2.5234)      // 내림
    Math.random()           // 0 ~ 1 사이의 난수 발생
    Math.pow(2,3)           // 거듭제곱 (2의 3승 = 8)
    Math.sqrt(9)            // 제곱근 (√9 = 3)
    
    -->
  </head>
  <body>
    <script>
      // Math 객체

      var num = 2.5234;

      document.write("PI=" + Math.PI + "<br>");
      document.write("오일러 상수=" + Math.E + "<br>");         // 2.718281828459045

      document.write("절댓값=" + Math.abs(-30) + "<br>");       // 30
      document.write("최댓값=" + Math.max(10, 5, 8, 30, 50) + "<br>"); // 50
      document.write("최솟값=" + Math.min(10, 5, 8, 30, 50) + "<br>"); // 5
      document.write("올림=" + Math.ceil(num) + "<br>");               // 3
      document.write("반올림=" + Math.round(num) + "<br>");            // 3
      document.write("내림=" + Math.floor(num) + "<br>");              // 2
      document.write("난수=" + Math.random() + "<br>");         // 0~1사이의 난수발생
      document.write("거듭제곱=" + Math.pow(2, 3) + "<br>");    // 2의 3승
      document.write("제곱근=" + Math.sqrt(9) + "<br>");        // 루트 9 = 3
    </script>

    <script>
        // 키보드로 가위, 바위, 보를 입력해서 난수로 발생된 값과의 일치 여부를 맞추는 가위바위보 게임 프로그램 만들기
        // 1~3 사이의 난수 발생: Math.random()이 0~1 사이의 난수 발생시키는 함수

        let t = prompt("가위, 바위, 보 중 하나를 입력하세요");
        switch(t) {
            case "가위": t = 1; break;
            case "바위": t = 2; break;
            case "보": t = 3; break;
            default: alert("잘못 입력하셨습니다. 가위, 바위, 보 중 하나를 입력하세요");
            location.reload();                              // 페이지 새로고침
        }

        // let r = Math.ceil(Math.random() * 3);            ceil 올림함수 사용해도 가능!
        let r = Math.floor(Math.random() * 3) + 1;          // 1~3 사이의 난수 발생
        document.write("입력한 값: " + t + "<br>");
        if (t == r) {
            document.write("맞췄습니다. 난수: " + r);
        } else {
            document.write("틀렸습니다. 난수: " + r);
        }

    </script>
  </body>
</html>
