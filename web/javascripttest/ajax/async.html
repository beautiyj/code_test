<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // async/await 형식 (권장)
      // 1. Promise의 불편한 점들을 해결하기 위해 ES7(ES2017)에서 async/await 키워드가 추가되었다.
      // 2. async/await 키워드를 사용하면 비동기 코드를 마치 동기 코드처럼 보이게 작성할 수 있다.

      async function fetchData() {
        // async : 비동기 함수
        try {
          // await : 요청 결과를 기다린다. (성공하면 다음 줄로 진행) = 순차적으로 진행되는 동기함수처럼 보이도록 작업
          const response = await fetch("https://jsonplaceholder.typicode.com/posts/1");
          const data = await response.json();
          console.log(data);
        } catch (error) {
          console.error("에러:", error);
        }
      }

      // 함수를 정의만 하면 실행되지 않으므로, 테스트를 위해 아래에서 강제로 한번 호출해주기
      fetchData();
    </script>
  </head>
  <body>
    <button onclick="fetchData()">데이터 가져오기</button>
    async/await는 콘솔창(F12)으로 확인 필요

    <!-- 버튼 누르면 콘솔창에서

    }
    -->
  </body>
</html>
