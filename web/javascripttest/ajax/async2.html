<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // async/await 형식 (권장)
      // 1. Promise의 불편한 점들을 해결하기 위해 ES7(ES2017)에서 async/await 키워드가 추가되었다.
      // 2. async/await 키워드를 사용하면 비동기 코드를 마치 동기 코드처럼 보이게 작성할 수 있다.
      async function fetchData() {
        try {
          // 1. API 서버로부터 비동기 데이터 가져오기(데이터 변수에 저장)
          const response = await fetch("https://jsonplaceholder.typicode.com/posts/1");
          const data = await response.json();

          // 2. HTML 엘리먼트 가져오기
          const userIdEl = document.getElementById("userId");
          const idEl = document.getElementById("id");
          const titleEl = document.getElementById("title");
          const bodyEl = document.getElementById("body");

          // 3. 브라우저 화면에 데이터 출력하기
          userIdEl.innerHTML = "userId: " + data.userId;
          idEl.innerHTML = "id: " + data.id;
          titleEl.innerHTML = "title: " + data.title;
          bodyEl.innerHTML = "body: " + data.body;
        } catch (error) {
          // 에러 발생 시 예외 처리
          console.error("에러 발생:", error);
        }
      }

      //   fetchData();             // 이거 풀면 버튼 안눌러도 바로 보임
    </script>
  </head>
  <body>
    <button onclick="fetchData()">데이터 가져오기</button>

    <div id="userId"></div>
    <div id="id"></div>
    <div id="title"></div>
    <div id="body"></div>
  </body>
</html>
