<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!--  Submit 서밋 제출 이벤트 예제
    
    Submit Event
        <form method="post" action="send.jsp" onSubmit="return check()">
            <input type="submit" value="전송">
        </form> 
    -->

    <script>
      function check() {
        var name = document.getElementById("name");
        var email = document.getElementById("email");

        if (name.value == "") {
          alert("이름을 입력 하세요.");
          name.focus();
          return false;                     // 체크 함수 빠져나가는 용도. 없으면 하단 함수 그대로 진행됨
        }
        if (email.value == "") {
          alert("email주소를 입력 하세요.");
          email.focus();
          return false;
        }
      }
    </script>
  </head>
  <body>

    <!-- submit은 무조건 폼 태그 내에서 사용해야하고 여러 개 만들 필요 없음 하나만 있어도 제출은 똑같음.
    <input type="button" onClick="check()">     // 버튼 클릭 시 함수 실행
    <input type="submit" value="전송">          // 클릭 시 바로 form 제출
    
    <form onSubmit="return check()">            // 제출 전 유효성 검사(focus) 후 제출
        폼 부분에 리턴 체크 안넣고 전송 버튼에 넣으면 유효성 검사 제대로 안된 상태로 넘어감.
        버튼 클릭 → check() 실행 → return false 반환 → 근데 submit 자체는 이미 진행 중 → 그냥 넘어가버림

        폼 태그 안에 넣어야
        버튼 클릭 → 제출 시도 → onSubmit 먼저 실행 → return false → 제출 차단 → return true  → 제출 진행

    -->
    <form method="post" action="send.jsp" onSubmit="return check()">
      이름 : <input type="text" id="name" name="name" /><br />
      이메일 : <input type="text" id="email" name="email" /><br />
      <input type="submit" value="전송" />
    </form>
  </body>
</html>
