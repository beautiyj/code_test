<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>브라우저 내장 객체 history</title>
  </head>
  <body>
    <h2>중간 페이지 28.html</h2>
    <p><a href="script29.html">마지막 페이지로 이동 (29html)</a></p>
    <input type="button" value="이전 페이지로 이동" onClick="history.back();" />

    <!-- history는 내가 실제로 방문한 페이지 기록만 저장
    뒤로가기 (back)   → 이전페이지 있음 - 작동
    앞으로가기 (go(1)) → 다음페이지 없음 - 작동 안함!
    
    go(1) 이랑 포워드() 비교하면
    둘 다 → 방문기록 기준 다음 페이지로 이동(방문기록에서 다음이 없으면 실행 안됨!)
    둘 다 → 다음 페이지 방문기록 없으면 안 됨

    다음/이전 기준 = 현재 내가 있는 위치 기준
    위치가 바뀌면 기준도 바뀜! forward()도 go(1)이랑 완전히 동일하게 동작함
    
    -->
    <input type="button" value="다음 페이지로 이동" onClick="history.go(1);" />
    <input type="button" value="forward 버튼(방문기록 기준 다음 페이지임)" onClick="history.forward();" />
  </body>
</html>
