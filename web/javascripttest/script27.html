    <title>브라우저 내장 객체 history</title>

    <!-- history 객체 메소드

    back() : 현재의 웹브라우저에서 방문한 이전 페이지로 이동
            history.back();

    forward() : 현재의 웹브라우저에서 방문한 다음 페이지로 이동
            history.forward(); 
    
    go() : + 또는 - 숫자를 설정하여 숫자만큼 방문한 페이지로 이동
            history.go(-1);


        이전 페이지 이동 : history.back(); 혹은 history.go(-1);  
        다음 페이지 이동 : history.forward(); 혹은 history.go(+1)
    
        백이나 고는 자주 쓰는데 포워드는 잘 안쓰긴 함
        history.back()    // 이전 페이지로 이동 - 뒤로가기 버튼 구현 시
        history.go(-1)    // back()이랑 동일, 숫자 조절 가능
    -->
</head>
