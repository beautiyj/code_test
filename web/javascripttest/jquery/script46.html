<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--  checkbox객체
    :checkbox : input type=checkbox 로 되어있는 태그를 모두 구해오는 필터 선택자
    
    prop() 메소드 : 프로퍼티(속성)에 속성값을 설정하거나 속성으로 속성값을 구해오는 역할을 하는 메소드
        prop( propertyName )
        prop( propertyName , value )
        
        prop( “checked” , true )  : checkbox에 체크를 활성화
        prop( “checked” , false ) : checkbox에 체크를 해제
        removeProp( “checked “ )  : checkbox에 체크를 해제
-->

    <script src="http://code.jquery.com/jquery-latest.js"></script>
    <script>
      // :checkbox 는 input type=checkbox 로 되어있는 태그를 모두 구해오는 필터 선택자
      $(document).ready(function () {
        $("#b1").click(function () {
          $(":checkbox").prop("checked", true); // 전부체크 버튼
        });

        $("#b2").click(function () {
          $(":checkbox").prop("checked", false); // 전부해제 버튼
          //          $(":checkbox").removeProp("checked");
        });
      });

      //   // :radio : input type=radio 로 되어있는 태그를 모두 구해오는 필터 선택자
      //   $(document).ready(function () {
      //     $("#b11").click(function () {
      //       if (
      //         $("#male").is(":checked") == false &&
      //         $("#female").is(":checked") == false &&
      //         $("#genderNone").is(":checked") == false
      //       ) {
      //         alert("성별을 선택하세요.");
      //         return false;
      //       }
      //     });
      //   });

      // 라디오 코드 더 간결하게 만들기. :radio 쓰면 input type=radio 3가지를 모두 가져옴
      $(document).ready(function () {
        $("#b11").click(function () {
          if ($(":radio").is(":checked") == false) {
            alert("성별을 선택하세요.");
            return false;
          }
        });
      });
    </script>

    <!--  radio객체 
        :radio : input type=radio 로 되어있는 태그를 모두 구해오는 필터 선택자
        is() 메소드 : radio버튼이나 checkbox의 선택 여부를 판별할때 사용되는 메소드.  
                     선택되면 true, 선택되지 않으면 false를 리턴한다.

        is( “ :checked ” )
        $(“ :radio “).is(“ :checked “) : 모든 radion 버튼을 구해와서 선택 여부를 판별한다.
-->
  </head>
  <body>
    스킬:
    <input type="checkbox" name="program" value="java" id="java" />java
    <input type="checkbox" name="program" value="oracle" id="oracle" />oracle
    <input type="checkbox" name="program" value="jsp" id="jsp" />jsp
    <input type="checkbox" name="program" value="spring" id="spring" />spring <br /><br />
    <input type="button" value="전부체크" id="b1" />
    <input type="button" value="전부해제" id="b2" />

    <br /><br />

    성별 : <input type="radio" id="male" name="gender" value="남자" />남자
    <input type="radio" id="female" name="gender" value="여자" />여자
    <input type="radio" id="genderNone" name="gender" value="선택안함" />선택안함 <br /><br />
    <input type="button" value="가입" id="b11" />
  </body>
</html>
