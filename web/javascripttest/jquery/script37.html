<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!--  each 함수 : 배열의 원소를 반복처리 하기 위한 함수

        var list = ['야구', '축구', '농구', '배구', '수영’]
        
        each함수 서식
        $.each(list, function(index, value) {   }); 
        index : 배열의 인덱스 번호를 받는다. 
        value : 배열의 원소값을 받는다

    -->

    <script src="http://code.jquery.com/jquery-latest.js"></script>
    <script>
      $(function () {
        var list = ["야구", "축구", "농구", "배구", "수영"];

        // 이렇게 하면 반복문 돌아가서 팝업 알림이 0:야구 1:축구 ... 4.수영 총 5번 차례로 뜸
        $.each(list, function (index, value) {
          alert(index + ":" + value);
          $("ol").append("<li>" + value + "</li>");
        });

        // 브라우저에 출력된 결과
        $.each(list, function (index, value) {
          document.write(index + ":" + value + "\t");
          $("ol").append("<li>" + value + "</li>");
        });
      });
    </script>
  </head>
  <body></body>
</html>
