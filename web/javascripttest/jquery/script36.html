<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!--  text, html 함수: 특정 태그 사이의 값을 구해오거나, 설정하는 역할을 하는 함수
        .text() : 특정 태그 사이의 값을 구해옴
        .text( text ) : 특정 태그 사이에 값을 설정함. html 태그를 문자로 처리함
        .html() : 특정 태그 사이의 값을 구해옴
        .html( htmlString ) : 특정 태그 사이에 값을 설정함. html 태그를 태그로 인식-> html태그로 처리함
    -->

    <script src="http://code.jquery.com/jquery-latest.js"></script>
    <script>
      $(document).ready(function () {
        var text = $("h1").text(); // 모든 h1태그의 내용을 읽어온다.
        var html = $("h1").html(); // 첫번째 h1태그의 내용만 읽어온다.

        alert("text: " + text); // 'javascript연습jQuery연습' 출력
        alert("html: " + html); // 'javascript연습' 출력

        $("h2").text("$('h2').text();<br>   // <br>태그를 문자로 처리함");
        $("h3").html("$('h3').html();<br>   // br태그를 html로 처리함(줄바꿈처리됨)");
      });
    </script>
  </head>
  <body>
    <h1>javascript연습</h1>
    <h1>jQuery연습</h1>
    <h2></h2>
    <h3></h3>
  </body>
</html>
