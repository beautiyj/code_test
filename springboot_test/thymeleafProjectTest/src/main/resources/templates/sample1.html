<!DOCTYPE html>

<!-- <html xmlns:th="http://www.thymeleaf.org"> 타입리프 적용 코드(없어도되긴함) -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>sample1</title>
</head>
<body>

	sample1

	<h1>Thymeleaf Test page</h1>

	<!-- th:text : 문자열 출력(데이터가 있으면 무조건 이 데이터로 태그 내부를 덮어씀)

	컨트롤러 파일의 코드 greeting을 불러오면 hello world가 출력됨
 	@RequestMapping("sample1")
	public String sample1(Model model) {
		model.addAttribute("greeting", "hello world");
		return "sample1";
	} -->

	<!-- 타임리프 문법을 사용했을 때, 그리팅 값이 있을 경우 <h1></h1> 사이의 문장은 덮어쓰기됨(출력안됨) -->
	<h1 th:text="${greeting}">Thymeleaf Test page</h1>

	<!-- 조건부 출력 (삼항 연산자 사용) 데이터가 있으면 데이터를 출력, 널이면 기본값 이라고 출력 -->
	<h2 th:text="${greeting1 != null} ? ${greeting1} : '기본값'"></h2>

	<!-- 타임리프의 'Default' 문법 (?:)  데이터가 있으면 데이터를 출력, 널이면 기본값 이라고 출력 -->
	<h3 th:text="${greeting1} ?: '기본값'"></h3>

	<!-- 조건문으로 <h1></h1> 사이의 문장 출력하려면 -->
	<h4 th:if="${not #strings.isEmpty(greeting1)}" th:text="${greeting1}">
		greeting1에 데이터가 있을 때, 이 문장은 출력 안됨(그리팅1만 출력됨)</h4>
	<h4>
		greeting1에 데이터가 있든 말든 태그 사이 문장 출력하려면 글씨를 앞에 써야함
		<span th:text="${greeting1}"></span>
	</h4>
	<h5 th:if="${#strings.isEmpty(greeting1)}">greeting1에 데이터가 없으면 해당
		문장 출력됨. 널일 때만 출력되는 태그 사이의 문장</h5>


</body>
</html>
