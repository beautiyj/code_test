<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>글 수정 폼</title>
</head>
<body>

	<form method=post action="boardupdate">
		<input type="hidden" name="no" th:value="${board.no}">
		<input type="hidden" name="page" th:value="${page}">
		<table border=1 width=400 align=center>
			<caption>글 수정</caption>
			<tr>
				<th>작성자명</th>
				<td><input type=text name="writer" required="required"
					th:value="${board.writer}"></td>
			</tr>
			<tr>
				<th>비밀번호</th>
				<td><input type=password name="passwd" required="required"></td>
			</tr>
			<tr>
				<th>제목</th>
				<td><input type=text name="subject" required="required"
					th:value="${board.subject}"></td>
			</tr>
			<tr>
				<th>내용</th>
				<td><textarea cols=40 rows=5 name="content" required="required"
						th:text="${board.content}"></textarea></td>
			</tr>
			<tr>
				<td colspan=2 align=center><input type=submit value="글수정">
					<input type=reset value="취소"></td>
			</tr>
		</table>
	</form>

</body>
</html>
