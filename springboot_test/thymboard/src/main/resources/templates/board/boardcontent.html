<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>상세 페이지</title>
</head>
<body>

	<table border="1" width=400 align="center">
		<caption>
			<h3>상세 페이지</h3>
		</caption>
		<tr>
			<td>작성자</td>
			<td th:text="${board.writer}"></td>
		</tr>
		<tr>
			<td>날짜</td>
			<td th:text="${#dates.format(board.register, 'yyyy-MM-dd HH:mm:ss')}"></td>
		</tr>
		<tr>
			<td>조회수</td>
			<td th:text="${board.readCount}"></td>
		</tr>
		<tr>
			<td>제목</td>
			<td th:text="${board.subject}"></td>
		</tr>
		<tr>
			<td>내용</td>
			<!-- 둘 다 가능 -->
			<td><pre th:text="${board.content}"></pre>
			<span th:utext="${content}"></span></td>
		</tr>
		
		<tr>
		<td colspan="2" align="center">
			<input type="button" value="목록"
				th:onclick="|location.href='@{/boardlist(page=${page})}'|">
			<input type="button" value="수정"
				th:onclick="|location.href='@{/boardupdateform(no=${board.no},page=${page})}'|">
			<input type="button" value="삭제"
				th:onclick="|location.href='@{/boarddeleteform(no=${board.no},page=${page})}'|">
			
		</td>
		</tr>
		
	</table>
</body>
</html>
