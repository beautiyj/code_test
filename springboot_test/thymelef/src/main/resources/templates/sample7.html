<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

<ul>
	<!-- 하이퍼 링크 -->		
	<li><a th:href="@{http://localhost/sample1}">sample1</a></li>
	<li><a th:href="@{/sample1}">sample1</a></li>
	<li><a th:href="@{~/sample1}">sample1</a></li>
	
	<!-- 링크를 통해서 값전달하기 -->
	<!-- http://localhost/sample?p1=aaa&p2=bbb -->
	<li><a th:href="@{/sample(p1='aaa', p2='bbb')}">sample</a></li>
</ul>

</body>
</html>
