<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

<!-- 자바스크립트 안에서 thymeleaf 사용하기 -->
<!-- script 태그에 th:inline="javascript"를 추가하면 
     자바스크립트 안에서 thymeleaf를 사용할 수 있다. -->
<script>                             // 출력안됨
	var result = [[${result}]];          
	document.write(result);
	alert(result);
</script>

<script th:inline="javascript">		 // 정상적인 출력
	var result = [[${result}]];
	document.write(result);
	alert(result);
</script>

</body>
</html>
